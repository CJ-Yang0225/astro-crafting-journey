schema: spec-driven

context: |
  ## Project
  Personal portfolio and blog platform — "astro-crafting-journey".
  Goal: showcase technical depth (Edge/Serverless/WebGL/animations) via Islands Architecture
  with multi-framework integration.

  ## Target Architecture
  - origin_application: Astro v6 + React 19 + Vue 3.5 — public blog, portfolio, admin UI
  - edge_auth_layer (planned): Hono + Cloudflare Workers — JWT auth, rate limiting, routing
  - distributed_kv (planned): Cloudflare KV — JWT blacklist, session metadata
  Request flow: Browser → CF edge_auth_layer → origin Astro

  ## Tech Stack
  - Framework: Astro v6.2.1, TypeScript 5.9 strict mode
  - UI Frameworks: React 19 (interactive islands), Vue 3.5 (showcase variety)
  - Styling: Tailwind CSS v4 + shadcn/ui (Radix UI primitives); HSL CSS custom properties
    defined in src/styles/globals.css via `@theme inline`
  - Content: MDX + shiki syntax highlighting (github-dark-dimmed theme)
  - Animations: Motion v12 (`motion/react`); GSAP + Three.js planned as islands
  - Forms: React Hook Form + Zod v4 + @hookform/resolvers v5
  - Icons: astro-icon with @iconify-json/lucide, mdi, ri
  - Notifications: sonner v2
  - Path aliases: `@/*` → `src/*`, `~/*` → `src/*`
  - Package manager: pnpm

  ## Dev Commands
  - pnpm dev           # localhost:4321
  - pnpm build         # astro check + build
  - pnpm preview       # preview production build
  - pnpm astro:check   # type check only
  - pnpm test:once     # vitest run
  - pnpm lint          # eslint
  - pnpm lint:fix      # eslint --fix
  - pnpm format        # prettier

  ## Routes
  / — index
  /blog — unified content entry (articles + notes)
  /blog/category/ — filter by category
  /projects — portfolio
  /skills — interactive tech stack visualization
  /about — personal profile + timeline
  /contact — professional contact form (React Hook Form + Zod)
  Admin routes (planned): /admin/login, /admin/dashboard, /admin/posts, /admin/projects

  ## Content Collections (src/content.config.ts)
  - blog/: Full articles and MDX posts
    Required: title, description, publishedAt, coverImage, category
  - notes/: Dev notes, snippets, quick references
    Required: title, createdAt, tags, category, type (learning|snippet|reference)
  - projects/: Portfolio entries
    Required: title, description, technologies, images, status, startDate

  ## Component Conventions
  - src/components/ui/ — shadcn/ui base components
  - src/components/layout/ — header, footer, nav
  - src/components/sections/ — page-level sections
  - src/components/forms/ — form islands (React)
  - Islands strategy: React for interactive/stateful; Vue for framework variety demos;
    pure Astro for static content
  - client:* usage: client:load above-fold interactive; client:idle deferred;
    client:visible below-fold
  - SSR-sensitive React islands must set immediatelyRender: false

  ## File & Code Conventions
  - File names: kebab-case (my-component.astro, app-input.tsx)
  - TypeScript: `interface` for props/inheritance; `type` for unions/aliases
  - Constants: src/constants/ with UPPER_SNAKE_CASE
  - Commits: conventional commits (feat, fix, docs, refactor, chore…)
  - Language in responses/comments: Traditional Chinese (zh-TW); code identifiers stay in English

  ## Key Directories
  src/
    config/     site.ts, nav-menu.ts, about.ts, landing.ts
    lib/        utils.ts, seo.ts, fetchers.ts, content-utils.ts, toc.ts
    layouts/    base-layout, main-layout, blog-post, auth-layout
    plugins/    remark-reading-time
    hooks/      use-mounted.ts
  astro.config.mjs — integrations; @tailwindcss/vite in vite.plugins; remarkReadingTime in mdx

  ## Architectural Constraints
  - Astro-first: zero-JS default; add JS only via islands
  - Vitest v4 runs in node environment (no jsdom); browser APIs unavailable in tests
  - 3D/animation effects must be encapsulated in islands to prevent SSR pollution
  - When edge auth layer is added: JWT issuance at edge; Astro server reads user context
    from forwarded headers; admin routes validated at both layers

rules:
  proposal:
    - Keep proposals concise; include Motivation, Goals, Non-goals, and Proposed Solution sections
    - Reference existing patterns in the codebase before introducing new abstractions
    - Flag Architectural Constraints impact if the change touches islands, SSR, or auth boundaries
  tasks:
    - Break tasks into chunks completable in ≤ 2 hours
    - Specify the target file(s) and component layer (ui / layout / section / form / island)
    - Note client:* directive when a task introduces or modifies an island
    - Include a pnpm command to verify the change (type-check, lint, or test)
